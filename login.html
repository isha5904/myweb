<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Login Form</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #0a0a0a;
      flex-direction: column;
    }
    .label {
      color: #fff;
      font-size: 24px;
      margin-bottom: 10px;
    }
    .box {
      position: relative;
      width: 320px;
      height: 60px;
      border-radius: 15px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 4px solid transparent;
    }
    .border-effect {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 15px;
      pointer-events: none;
    }
    .border-effect::before,
    .border-effect::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 15px;
      border: 4px solid transparent;
      box-sizing: border-box;
    }
    .border-effect::before {
      border-color: #1E90FF;
      box-shadow: 0 0 15px rgba(30, 144, 255, 1), 0 0 30px rgba(30, 144, 255, 0.8), 0 0 45px rgba(30, 144, 255, 0.6);
      clip-path: inset(0 75% 75% 0);
      animation: move-red 3s linear infinite;
    }
    .border-effect::after {
      border-color: #FF00FF;
      box-shadow: 0 0 15px rgba(255, 0, 255, 1), 0 0 30px rgba(255, 0, 255, 0.8), 0 0 45px rgba(255, 0, 255, 0.6);
      clip-path: inset(75% 0 0 75%);
      animation: move-blue 3s linear infinite;
    }
    .inner {
      position: relative;
      background: linear-gradient(135deg, #131313, #1a1a1a);
      border-radius: 13px;
      width: 96%;
      height: 96%;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 10px;
    }
    .box:hover {
      height: 300px;
    }
    .box input {
      width: 80%;
      padding: 10px;
      margin: 10px 0;
      background: transparent;
      border: 2px solid #ffffff;
      border-radius: 25px;
      color: #fff;
      outline: none;
      opacity: 0;
      transition: opacity 0.5s ease-in-out, border-color 0.3s;
    }
    .box:hover input {
      opacity: 1;
    }
    .box button {
      width: 80%;
      padding: 10px;
      border: 2px solid #ffffff;
      background: transparent;
      color: #ffffff;
      font-weight: bold;
      border-radius: 25px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.5s ease-in-out, background 0.3s;
    }
    .box:hover button {
      opacity: 1;
    }
    .box a {
      display: block;
      margin-top: 10px;
      color: #ffffff;
      text-decoration: none;
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
    }
    .box:hover a {
      opacity: 1;
    }
    @keyframes move-red {
      0% {
        clip-path: inset(0 75% 75% 0);
      }
      50% {
        clip-path: inset(0 0 0 0);
      }
      100% {
        clip-path: inset(0 75% 75% 0);
      }
    }
    @keyframes move-blue {
      0% {
        clip-path: inset(75% 0 0 75%);
      }
      50% {
        clip-path: inset(0 0 0 0);
      }
      100% {
        clip-path: inset(75% 0 0 75%);
      }
    }
  </style>
</head>
<body>
  <div class="label">LOGIN</div>
  <div class="box">
    <div class="border-effect"></div>
    <div class="inner">
      <input type="text" placeholder="Username">
      <input type="password" placeholder="Password">
      <button>Sign in</button>
      <a href="#">Forgot Password</a>
      <a href="registration.html">Sign up</a>
    </div>
  </div>
</body>
</html>
